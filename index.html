<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everett Gold</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
background: #000;
color: #fff;
overflow: hidden;
height: 100vh;
font-family: Arial, sans-serif;
}
.slideshow {
height: 100vh;
position: relative;
}
.slide {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
opacity: 0;
transition: opacity 0.7s ease;
display: none;
}
.slide.active {
opacity: 1;
display: block;
}
.slide img {
width: 100%;
height: 100%;
object-fit: contain; /* This fixes "too big" — shows whole photo without cropping */
background: #000;
}
footer {
position: fixed;
bottom: 20px;
left: 0; right: 0;
text-align: center;
font-size: 13px;
color: rgba(255,255,255,0.6);
z-index: 100;
pointer-events: none;
}
</style>
</head>
<body>
<div class="slideshow" id="slideshow">
<div class="slide active">
<img src="photo1.jpg" alt="">
</div>
<div class="slide">
<img src="photo2.jpg" alt="">
</div>
<div class="slide">
<img src="photo3.jpg" alt="">
</div>
<!-- Add more slides here if you want (copy-paste the block above) -->
</div>

<footer>
Everett Gold © 2026
</footer>

<script>
const slides = document.querySelectorAll('.slide');
let current = 0;

function nextSlide() {
current = (current + 1) % slides.length;
slides.forEach(s => s.classList.remove('active'));
slides[current].classList.add('active');
}

// Tap or click anywhere on the image to go next
document.getElementById('slideshow').addEventListener('click', nextSlide);

// Keyboard support (left/right arrows)
document.addEventListener('keydown', e => {
if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
});
</script>
</body>
</html>
