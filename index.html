<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everett Gold</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
font-family: Arial, sans-serif;
background: #ffffff;
color: #000000;
height: 100vh;
overflow: hidden;
}
header {
display: flex;
justify-content: space-between;
align-items: center;
padding: 25px 40px;
border-bottom: 1px solid #ddd;
}
.logo {
font-weight: bold;
font-size: 24px;
}
nav a {
margin-left: 30px;
text-decoration: none;
color: black;
font-size: 18px;
}
nav a:hover { text-decoration: underline; }

.slideshow {
height: calc(100vh - 135px);
display: flex;
align-items: center; /* Vertical centering */
justify-content: center; /* Horizontal centering */
padding: 20px;
position: relative;
overflow: hidden;
}
.slide {
width: 100%;
max-width: 100%;
opacity: 0;
transition: opacity 0.8s ease;
display: none;
}
.slide.active {
opacity: 1;
display: block;
}
.slide img {
width: 100%;
max-height: 75vh; /* Smaller on all devices */
height: auto;
object-fit: contain;
margin: 0 auto;
display: block;
background: #f9f9f9;
}

footer {
padding: 15px 40px;
text-align: center;
font-size: 12px; /* Smaller footer text */
color: #777;
border-top: 1px solid #ddd;
}

/* Extra mobile tweaks */
@media (max-width: 600px) {
header, footer {
padding: 18px 20px;
}
.logo { font-size: 21px; }
nav a {
margin-left: 20px;
font-size: 17px;
}
.slideshow {
padding: 15px;
}
.slide img {
max-height: 68vh; /* Even smaller on phones */
}
}
</style>
</head>
<body>
<header>
<div class="logo">Everett Gold</div>
<nav>
<a href="info.html">INFO</a>
</nav>
</header>

<div class="slideshow" id="slideshow">
<div class="slide active">
<img src="photo1.jpg" alt="">
</div>
<div class="slide">
<img src="photo2.jpg" alt="">
</div>
<div class="slide">
<img src="photo3.jpg" alt="">
</div>
<!-- Add more slides here if needed -->
</div>

<footer>
Website © 2026 Everett Gold. All Rights Reserved.
</footer>

<script>
const slides = document.querySelectorAll('.slide');
let current = 0;

function nextSlide() {
current = (current + 1) % slides.length;
slides.forEach(s => s.classList.remove('active'));
slides[current].classList.add('active');
}

// Auto transition every 4 seconds
setInterval(nextSlide, 4000);

// Click/tap to advance manually
document.getElementById('slideshow').addEventListener('click', nextSlide);

// Keyboard support
document.addEventListener('keydown', e => {
if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
});
</script>
</body>
</html>
