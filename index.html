<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Name — Photography</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
font-family: Arial, sans-serif;
background: #fff;
color: #000;
overflow: hidden;
height: 100vh;
}
header {
position: fixed;
top: 0;
left: 0;
right: 0;
display: flex;
justify-content: space-between;
align-items: center;
padding: 20px 40px;
z-index: 100;
background: rgba(255,255,255,0.85);
border-bottom: 1px solid #ddd;
}
.logo { font-weight: bold; font-size: 24px; }
nav a {
margin-left: 30px;
text-decoration: none;
color: black;
font-size: 18px;
}
nav a:hover { text-decoration: underline; }

.slideshow {
height: 100vh;
position: relative;
overflow: hidden;
}
.slide {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
opacity: 0;
transition: opacity 0.6s ease;
display: none;
}
.slide.active {
opacity: 1;
display: block;
}
.slide img {
width: 100%;
height: 100%;
object-fit: cover;
}
.nav-btn {
position: absolute;
top: 50%;
transform: translateY(-50%);
background: rgba(255,255,255,0.7);
color: black;
border: none;
width: 50px;
height: 50px;
font-size: 24px;
cursor: pointer;
z-index: 10;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
}
.prev { left: 30px; }
.next { right: 30px; }

footer {
position: fixed;
bottom: 20px;
left: 0;
right: 0;
text-align: center;
font-size: 14px;
color: #666;
z-index: 100;
}

@media (max-width: 600px) {
header { padding: 15px 20px; }
nav a { margin-left: 15px; font-size: 16px; }
.nav-btn { width: 40px; height: 40px; font-size: 20px; }
}
</style>
</head>
<body>
<header>
<div class="logo">Everett Gold</div>
<nav>
<!-- INDEX link removed as requested -->
<a href="info.html">INFO</a>
</nav>
</header>

<div class="slideshow" id="slideshow">
<!-- Add your photos here -->
<div class="slide active">
<img src="photo1.jpg" alt="Photo 1">
</div>
<div class="slide">
<img src="photo2.jpg" alt="Photo 2">
</div>
<div class="slide">
<img src="photo3.jpg" alt="Photo 3">
</div>
<!-- Add more slides below as needed -->
</div>

<button class="nav-btn prev" id="prev">‹</button>
<button class="nav-btn next" id="next">›</button>

<footer>
Website © 2026 Your Name. All Rights Reserved.
</footer>

<script>
const slides = document.querySelectorAll('.slide');
let currentIndex = 0;

function showSlide(index) {
slides.forEach((slide, i) => {
slide.classList.remove('active');
if (i === index) slide.classList.add('active');
});
}

function nextSlide() {
currentIndex = (currentIndex + 1) % slides.length;
showSlide(currentIndex);
}

function prevSlide() {
currentIndex = (currentIndex - 1 + slides.length) % slides.length;
showSlide(currentIndex);
}

// Button clicks
document.getElementById('next').addEventListener('click', nextSlide);
document.getElementById('prev').addEventListener('click', prevSlide);

// Tap/click anywhere on the image to go next
document.getElementById('slideshow').addEventListener('click', (e) => {
if (e.target.tagName !== 'BUTTON') {
nextSlide();
}
});

// Keyboard support
document.addEventListener('keydown', (e) => {
if (e.key === 'ArrowRight') nextSlide();
if (e.key === 'ArrowLeft') prevSlide();
});

// Optional auto-advance (uncomment the line below if you want it)
// setInterval(nextSlide, 6000);
</script>
</body>
</html>
